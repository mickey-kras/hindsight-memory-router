name: policy

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    name: guard
    runs-on: ubuntu-latest
    steps:
      - name: Inspect PR policy-sensitive files
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;

            const wfDir = ['.github', 'workflows'].join('/');
            const publishPath = [wfDir, 'publish.yml'].join('/');
            const ciPath = [wfDir, 'ci.yml'].join('/');
            const codeqlPath = [wfDir, 'codeql.yml'].join('/');
            const checkoutAction = ['actions', 'checkout'].join('/');
            const oidcWrite = ['id-token', 'write'].join(': ');
            const packagesWrite = ['packages', 'write'].join(': ');
            const forbiddenPermission = ['permissions', 'write-all'].join(': ');
            const targetEvent = ['pull_request', 'target'].join('_');
            const headTerms = [
              ['github.event.pull_request', 'head'].join('.'),
              ['github', 'head_ref'].join('.'),
              ['head', 'sha'].join('.'),
              ['pull_request', 'head'].join('.'),
            ];

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const changed = files.map((file) => file.filename);
            const failures = [];

            async function readFileAtHead(path) {
              const response = await github.rest.repos.getContent({
                owner,
                repo,
                path,
                ref: headSha,
              });
              const data = response.data;
              if (!('content' in data)) return '';
              return Buffer.from(data.content, data.encoding || 'base64').toString('utf8');
            }

            function fail(message) {
              failures.push(message);
            }

            function stripYamlBlockScalars(content) {
              const lines = content.split('\n');
              const kept = [];
              for (let i = 0; i < lines.length; i += 1) {
                const line = lines[i];
                kept.push(line);

                const block = line.match(/^(\s*)[A-Za-z0-9_-]+:\s*[>|]/);
                if (!block) continue;

                const parentIndent = block[1].length;
                while (i + 1 < lines.length) {
                  const next = lines[i + 1];
                  const nextIndent = next.match(/^\s*/)[0].length;
                  if (next.trim() === '' || nextIndent > parentIndent) {
                    i += 1;
                    continue;
                  }
                  break;
                }
              }
              return kept.join('\n');
            }

            function yamlSurface(content) {
              return stripYamlBlockScalars(content)
                .split('\n')
                .filter((line) => !line.trimStart().startsWith('#'))
                .join('\n');
            }

            for (const path of changed) {
              if (!path.startsWith(`${wfDir}/`)) continue;
              if (!path.endsWith('.yml') && !path.endsWith('.yaml')) continue;

              const content = await readFileAtHead(path);
              const surface = yamlSurface(content);
              const lower = surface.toLowerCase();

              if (lower.split('\n').some((line) => line.trim() === forbiddenPermission)) {
                fail(`${path}: broad write permissions are not allowed`);
              }

              if (lower.includes(targetEvent) && lower.includes(checkoutAction)) {
                if (headTerms.some((term) => lower.includes(term))) {
                  fail(`${path}: trusted PR workflows must not checkout contributor head code`);
                }
              }

              if (lower.includes(oidcWrite) && path !== publishPath) {
                fail(`${path}: OIDC write permission is only allowed in the publish workflow`);
              }

              if (lower.includes(packagesWrite) && path !== publishPath) {
                fail(`${path}: package write permission is only allowed in the publish workflow`);
              }
            }

            if (changed.includes(publishPath)) {
              const publish = await readFileAtHead(publishPath);
              if (!publish.includes('pull_request:')) {
                fail('publish.yml: pull request preflight trigger must stay enabled');
              }
              if (!publish.includes('name: container')) {
                fail('publish.yml: required container preflight job must stay present');
              }
              if (!publish.includes('name: publish')) {
                fail('publish.yml: real publish job must stay present');
              }
              if (!publish.includes('Trivy critical gate')) {
                fail('publish.yml: Trivy critical gate must stay present');
              }
              if (!publish.includes('ignore-unfixed: true')) {
                fail('publish.yml: Trivy gate must ignore unfixed vulnerabilities');
              }
            }

            if (changed.includes(ciPath)) {
              const ci = await readFileAtHead(ciPath);
              if (!ci.includes('name: ci')) fail('ci.yml: workflow name must remain ci');
              if (!ci.includes('checks:')) fail('ci.yml: required checks job must stay present');
              if (!ci.includes('aislop status')) fail('ci.yml: required aislop status job must stay present');
              if (!ci.includes('Gitleaks')) fail('ci.yml: Gitleaks step must stay present');
              if (!ci.includes('Semgrep')) fail('ci.yml: Semgrep step must stay present');
              if (!ci.includes('Hadolint')) fail('ci.yml: Hadolint step must stay present');
            }

            if (changed.includes(codeqlPath)) {
              const codeql = await readFileAtHead(codeqlPath);
              if (!codeql.includes('name: codeql')) fail('codeql.yml: workflow name must remain codeql');
              if (!codeql.includes('analyze:')) fail('codeql.yml: required analyze job must stay present');
              if (!codeql.includes('github/codeql-action/analyze')) {
                fail('codeql.yml: CodeQL analyze action must stay present');
              }
            }

            if (failures.length > 0) {
              core.setFailed(`Policy guard failed:\n- ${failures.join('\n- ')}`);
            } else {
              core.info('Policy guard passed.');
            }
