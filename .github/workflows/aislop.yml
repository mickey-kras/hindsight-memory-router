name: aislop

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  status:
    name: status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Aislop quality gate
        run: npx --yes aislop@latest ci --human

      - name: Aislop SARIF
        if: always()
        run: npx --yes aislop@latest ci --sarif > aislop.sarif

      - name: Upload Aislop SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: aislop.sarif
