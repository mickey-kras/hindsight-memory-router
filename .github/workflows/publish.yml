name: publish

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  container:
    name: container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      IMAGE_GHCR: ghcr.io/${{ github.repository }}
      TRIVY_SKIP_VERSION_CHECK: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: docker/setup-buildx-action@v4

      - name: Build image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: |
            ${{ env.IMAGE_GHCR }}:${{ github.sha }}

      - name: Trivy image report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_GHCR }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          version: v0.71.2

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy critical gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_GHCR }}:${{ github.sha }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          version: v0.71.2

  publish:
    name: publish
    needs: container
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      IMAGE_GHCR: ghcr.io/${{ github.repository }}
      IMAGE_DOCKERHUB: docker.io/mickeykrasilnikov/hindsight-memory-router
    steps:
      - uses: actions/checkout@v4

      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push GHCR
        id: build-ghcr
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_GHCR }}:latest
            ${{ env.IMAGE_GHCR }}:${{ github.sha }}

      - name: Build and push Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_DOCKERHUB }}:latest
            ${{ env.IMAGE_DOCKERHUB }}:${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign GHCR image
        run: cosign sign --yes ${{ env.IMAGE_GHCR }}@${{ steps.build-ghcr.outputs.digest }}

      - name: Attest GHCR image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_GHCR }}
          subject-digest: ${{ steps.build-ghcr.outputs.digest }}
          push-to-registry: true
